<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MICROJOY UNIVERSAL v2.1</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0c">
    <link rel="apple-touch-icon" href="icon.png">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root {
            --bg-color: #08080a;
            --panel-bg: rgba(18, 18, 22, 0.6);
            --panel-border: rgba(255, 255, 255, 0.08);
            --theme-red: #ff3333;
            --theme-red-dim: #4a0f0f;
            --theme-red-glow: rgba(255, 51, 51, 0.5);
            --danger: #ffaa00; 
            --text-main: #f0f0f0;
            --text-muted: #888899;
            --cyan-glow: #00e6cc;
            --success: #00ff66;
        }

        * { 
            box-sizing: border-box; 
            font-family: 'Share Tech Mono', 'Courier New', monospace; 
            user-select: none; 
            -webkit-user-select: none; 
        }

        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100dvh;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(255, 51, 51, 0.05) 0%, transparent 50%),
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            color: var(--text-main);
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* --- HEADER --- */
        .header {
            padding: 15px 25px; 
            background: rgba(10, 10, 12, 0.8);
            border-bottom: 1px solid var(--panel-border);
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
        .brand-container {
            display: flex; flex-direction: column;
        }
        .brand-line { 
            font-weight: bold; color: var(--text-main); 
            letter-spacing: 2px; font-size: 1.2rem; 
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
            display: flex; align-items: center; gap: 8px;
        }
        .brand-line::before {
            content: ''; display: inline-block; width: 8px; height: 8px; background: var(--theme-red);
            border-radius: 50%; box-shadow: 0 0 8px var(--theme-red);
        }
        .ver-tag { color: var(--theme-red); font-size: 0.75rem; margin-top: 4px; letter-spacing: 3px; }
        
        .header-controls {
            display: flex; gap: 10px; align-items: center;
        }

        .btn-icon {
            background: transparent; border: 1px solid var(--panel-border);
            color: var(--text-muted); padding: 8px 15px; border-radius: 6px;
            cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px;
            font-size: 0.9rem;
        }
        .btn-icon:hover { background: rgba(255,255,255,0.05); color: var(--text-main); }
        .btn-icon:active { transform: scale(0.95); }

        select.btn-icon {
            appearance: none;
            -webkit-appearance: none;
            background-color: rgba(10, 10, 12, 0.8);
            outline: none;
        }
        select.btn-icon option {
            background-color: #08080a;
            color: var(--text-main);
        }

        /* --- MAIN DASHBOARD --- */
        .dashboard {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; padding: 25px; gap: 25px;
            overflow-y: auto;
        }

        /* --- TELEMETRY HUD --- */
        .telemetry-panel {
            width: 100%; max-width: 550px;
            background: var(--panel-bg); 
            border: 1px solid var(--panel-border);
            border-radius: 16px; padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        
        .tel-header { 
            color: var(--text-muted); font-size: 0.85rem; 
            border-bottom: 1px solid var(--panel-border); padding-bottom: 10px; margin-bottom: 20px; 
            text-transform: uppercase; letter-spacing: 2px; display: flex; justify-content: space-between;
        }

        .tel-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px 25px;
        }

        .tel-row { 
            display: flex; justify-content: space-between; align-items: center; 
            font-size: 1.05rem; color: var(--text-muted); 
            background: rgba(0,0,0,0.2); padding: 8px 12px; border-radius: 6px;
        }
        .tel-value { color: var(--text-main); font-weight: bold; }
        .val-active { color: var(--theme-red); text-shadow: 0 0 8px var(--theme-red-glow); }
        
        .tel-tx-row { 
            background: rgba(0, 230, 204, 0.05); border: 1px solid rgba(0, 230, 204, 0.1);
            padding: 15px; border-radius: 8px; margin-top: 15px; 
            font-size: 1.2rem; color: var(--text-muted); display: flex; justify-content: space-between; align-items: center;
        }
        .tel-tx-val { color: var(--cyan-glow); text-shadow: 0 0 12px rgba(0,255,204,0.3); font-weight: bold; letter-spacing: 1px; }

        /* --- STATUS CLUSTER --- */
        .status-cluster {
            display: flex; width: 100%; max-width: 550px; gap: 20px;
        }

        .status-card {
            flex: 1; background: var(--panel-bg);
            border: 1px solid var(--panel-border); border-radius: 16px;
            padding: 25px 20px; display: flex; flex-direction: column;
            align-items: center; justify-content: space-between;
            transition: all 0.3s ease; position: relative; overflow: hidden;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }
        
        .status-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: var(--text-muted); transition: all 0.4s ease; opacity: 0.3;
        }

        .status-card.active { border-color: rgba(255, 51, 51, 0.3); }
        .status-card.active::before { background: var(--theme-red); opacity: 1; box-shadow: 0 0 15px var(--theme-red); }
        .status-card.active-success { border-color: rgba(0, 255, 102, 0.3); }
        .status-card.active-success::before { background: var(--success); opacity: 1; box-shadow: 0 0 15px var(--success); }
        
        .card-title { font-size: 0.85rem; color: var(--text-muted); letter-spacing: 2px; margin-bottom: 15px; text-align: center; }
        .card-indicator { 
            font-size: 1.1rem; font-weight: bold; color: var(--text-muted); margin-bottom: 25px; text-align: center; 
            letter-spacing: 1px; transition: color 0.3s;
        }
        .status-card.active .card-indicator { color: var(--theme-red); text-shadow: 0 0 10px var(--theme-red-glow); }
        .status-card.active-success .card-indicator { color: var(--success); text-shadow: 0 0 10px rgba(0,255,102,0.4); }

        .btn-action {
            width: 100%; background: rgba(255, 255, 255, 0.03);
            color: var(--text-main); border: 1px solid var(--panel-border);
            padding: 14px 0; border-radius: 8px; font-size: 0.95rem;
            font-weight: bold; letter-spacing: 2px; cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
        }
        .btn-action:hover { background: rgba(255, 255, 255, 0.08); transform: translateY(-2px); }
        .btn-action:active { transform: translateY(1px); }
        
        .btn-red { border-color: rgba(255,51,51,0.4); color: #ff6b6b; background: rgba(255,51,51,0.05); }
        .btn-red:hover { background: rgba(255,51,51,0.15); box-shadow: 0 5px 15px rgba(255,51,51,0.2); color: #fff;}

        .hint-text { font-size: 0.7rem; color: var(--text-muted); text-align: center; margin-top: 15px; letter-spacing: 1px; opacity: 0.7; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .anim-pulse { animation: pulse 2s infinite; }

        @media (orientation: landscape) {
            .dashboard { flex-direction: row; justify-content: center; align-items: stretch; }
            .telemetry-panel { flex: 1.5; margin-bottom: 0; }
            .status-cluster { flex: 1; flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand-container">
            <div class="brand-line">MICROJOY UNIVERSAL</div>
            <div class="ver-tag">SYSTEM v2.1 // ALIMIN</div>
        </div>
        <div class="header-controls">
            <select id="controllerType" class="btn-icon">
                <option value="ps4">🎮 PS4/DSense</option>
                <option value="xbox">🎮 Xbox</option>
                <option value="generic">🎮 Generic</option>
            </select>
            <button class="btn-icon" id="btnFullscreen">⛶ FULLSCREEN</button>
        </div>
    </div>

    <div class="dashboard">
        
        <div class="telemetry-panel">
            <div class="tel-header"><span>Controller Raw Input</span> <span>DATA LINK</span></div>
            
            <div class="tel-grid">
                <div class="tel-row"><span>AXIS-X:</span><span class="tel-value" id="psX">0.00</span></div>
                <div class="tel-row"><span>AXIS-Y:</span><span class="tel-value" id="psY">0.00</span></div>
                <div class="tel-row"><span>D-PAD:</span><span class="tel-value" id="psDpad">IDLE</span></div>
                <div class="tel-row"><span id="lblBtn0">[✕] A:</span><span class="tel-value" id="psCross">OFF</span></div>
                <div class="tel-row"><span id="lblBtn1">[◯] B:</span><span class="tel-value" id="psCircle">OFF</span></div>
                <div class="tel-row"><span id="lblBtn2">[□] C:</span><span class="tel-value" id="psSquare">OFF</span></div>
                <div class="tel-row" style="grid-column: 1 / span 2;"><span id="lblBtn3">[△] D:</span><span class="tel-value" id="psTriangle">OFF</span></div>
            </div>

            <div class="tel-header" style="margin-top: 30px;">Micro:bit Payload</div>
            <div class="tel-tx-row">
                <span>TX_OUT:</span><span class="tel-tx-val anim-pulse" id="telemetryOut">AWAITING</span>
            </div>
        </div>

        <div class="status-cluster">
            <div class="status-card" id="dsCard">
                <div class="card-title" id="controllerTitle">PLAYSTATION CONTROLLER</div>
                <div class="card-indicator anim-pulse" id="dsStatus">AWAITING PAIR</div>
                <button class="btn-action" id="btnCalibrate">CALIBRATE</button>
                <div class="hint-text">Press Start/PS Button to Connect</div>
            </div>

            <div class="status-card" id="botCard">
                <div class="card-title">MICRO:BIT LINK</div>
                <div class="card-indicator anim-pulse" id="botStatus">OFFLINE</div>
                <button class="btn-action btn-red" id="btnConnect">LINK BLE</button>
                <div class="hint-text">Wake Lock Enabled</div>
            </div>
        </div>

    </div>

    <script>
        // --- PWA REGISTRATION ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
        }

        // --- UI & CONTROLLER TYPE SELECTION ---
        const controllerType = document.getElementById('controllerType');
        const lblBtn0 = document.getElementById('lblBtn0');
        const lblBtn1 = document.getElementById('lblBtn1');
        const lblBtn2 = document.getElementById('lblBtn2');
        const lblBtn3 = document.getElementById('lblBtn3');
        const controllerTitle = document.getElementById('controllerTitle');
        const dsStatusEl = document.getElementById('dsStatus');

        const controllerProfiles = {
            ps4: {
                title: "PLAYSTATION CONTROLLER",
                btn0: "[✕] A:", btn1: "[◯] B:", btn2: "[□] C:", btn3: "[△] D:"
            },
            xbox: {
                title: "XBOX CONTROLLER",
                btn0: "[A] A:", btn1: "[B] B:", btn2: "[X] C:", btn3: "[Y] D:"
            },
            generic: {
                title: "GENERIC GAMEPAD",
                btn0: "[B0] A:", btn1: "[B1] B:", btn2: "[B2] C:", btn3: "[B3] D:"
            }
        };

        controllerType.addEventListener('change', (e) => {
            const profile = controllerProfiles[e.target.value];
            controllerTitle.innerText = profile.title;
            lblBtn0.innerText = profile.btn0;
            lblBtn1.innerText = profile.btn1;
            lblBtn2.innerText = profile.btn2;
            lblBtn3.innerText = profile.btn3;
            
            // Semak jika gamepad tiada yang bersambung, set balik text
            if (!navigator.getGamepads()[0]) dsStatusEl.innerText = "AWAITING PAIR";
        });

        // --- FULLSCREEN MANAGEMENT ---
        const btnFullscreen = document.getElementById('btnFullscreen');
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.warn(`Ralat Fullscreen: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        btnFullscreen.addEventListener('click', toggleFullscreen);

        // --- SCREEN WAKE LOCK API & FIRST CLICK HANDLER ---
        let wakeLock = null;

        async function requestWakeLock() {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
                console.log('Wake Lock Aktif: Screen tidak akan terpadam.');
                wakeLock.addEventListener('release', () => console.log('Wake Lock terlepas.'));
            } catch (err) {
                console.error(`Wake Lock Error: ${err.name}, ${err.message}`);
            }
        }

        document.addEventListener('click', () => {
            if (!wakeLock) requestWakeLock();
        }, { once: true });

        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                requestWakeLock();
            }
        });

        // --- BLE CORE (MICRO:BIT PROTOCOL) ---
        const UART_SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
        const UART_RX_CHARACTERISTIC_UUID = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";
        let bleDevice, rxChar;
        let cX = 0, cY = 0, lX = 0, lY = 0;

        const botCard = document.getElementById('botCard');
        const botStatusEl = document.getElementById('botStatus');
        const telEl = document.getElementById('telemetryOut');
        const connBtn = document.getElementById('btnConnect');

        connBtn.addEventListener('click', async () => {
            requestWakeLock();

            if (bleDevice?.gatt.connected) { bleDevice.gatt.disconnect(); return; }
            try {
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: "BBC" }, { namePrefix: "micro:bit" }],
                    optionalServices: [UART_SERVICE_UUID]
                });
                const server = await bleDevice.gatt.connect();
                const service = await server.getPrimaryService(UART_SERVICE_UUID);
                rxChar = await service.getCharacteristic(UART_RX_CHARACTERISTIC_UUID);
                
                botStatusEl.innerText = "LINK ESTABLISHED"; 
                botStatusEl.classList.remove('anim-pulse');
                botCard.classList.add('active-success');
                connBtn.innerText = "SEVER CONNECTION";
                connBtn.classList.remove('btn-red');
                telEl.classList.remove('anim-pulse');
                await send("mode_analog\n");
            } catch (e) { console.error("BLE Error:", e); }
        });

        bleDevice?.addEventListener('gattserverdisconnected', () => {
            botStatusEl.innerText = "OFFLINE"; 
            botStatusEl.classList.add('anim-pulse');
            botCard.classList.remove('active-success');
            connBtn.innerText = "LINK BLE"; 
            connBtn.classList.add('btn-red');
            telEl.innerText = "SEVERED";
            telEl.classList.add('anim-pulse');
            rxChar = null;
        });

        // --- PENGHANTARAN DATA TANPA DELAY ---
        let isSending = false;

        async function send(s) {
            telEl.innerText = `${s.replace('\n','')}`;
            if (!rxChar || isSending) return; 
            
            isSending = true;
            try { 
                if (rxChar.properties && rxChar.properties.writeWithoutResponse) {
                    await rxChar.writeValueWithoutResponse(new TextEncoder().encode(s));
                } else {
                    await rxChar.writeValue(new TextEncoder().encode(s)); 
                }
            } catch (e) {
                console.warn("Kesesakan BLE, packet digugurkan:", e);
            } finally {
                isSending = false;
            }
        }

        const fFormat = (v) => (v>=0?'+':'-') + Math.abs(v).toString().padStart(2,'0');

        // --- GAMEPAD API BRIDGE ---
        const dsCard = document.getElementById('dsCard');
        const btnCalibrate = document.getElementById('btnCalibrate');
        
        const outPsX = document.getElementById('psX');
        const outPsY = document.getElementById('psY');
        const outPsDpad = document.getElementById('psDpad');
        const outPsCross = document.getElementById('psCross');
        const outPsCircle = document.getElementById('psCircle');
        const outPsSquare = document.getElementById('psSquare');
        const outPsTriangle = document.getElementById('psTriangle');

        let gpState = { cross: false, circle: false, square: false, triangle: false };
        const GP_DEADZONE = 0.15;
        
        let offsetX = 0;
        let offsetY = 0;
        
        let lastSendTime = 0;
        const SEND_INTERVAL = 40;

        btnCalibrate.addEventListener('click', () => {
            const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
            const gp = gamepads[0];
            if (gp) {
                offsetX = gp.axes[0];
                offsetY = gp.axes[1];
                alert("Joystick dikalibrasi! Titik tengah baru telah ditetapkan.");
            } else {
                alert("Sila sambungkan controller terlebih dahulu.");
            }
        });

        window.addEventListener("gamepadconnected", (e) => {
            dsStatusEl.innerText = "CONTROLLER ACQUIRED"; 
            dsStatusEl.classList.remove('anim-pulse');
            dsCard.classList.add('active');
        });

        window.addEventListener("gamepaddisconnected", (e) => {
            dsStatusEl.innerText = "AWAITING PAIR"; 
            dsStatusEl.classList.add('anim-pulse');
            dsCard.classList.remove('active');
            outPsX.innerText = "0.00"; outPsY.innerText = "0.00"; 
            outPsDpad.innerText = "IDLE"; outPsDpad.classList.remove('val-active');
            outPsCross.innerText = "OFF"; outPsCircle.innerText = "OFF";
            outPsSquare.innerText = "OFF"; outPsTriangle.innerText = "OFF";
            [outPsCross, outPsCircle, outPsSquare, outPsTriangle].forEach(el => el.classList.remove('val-active'));
            cX = 0; cY = 0; offsetX = 0; offsetY = 0;
            send("X+00,Y+00\n"); 
        });

        function updateBtnUI(element, isPressed, labelOn = "ON", labelOff = "OFF") {
            element.innerText = isPressed ? labelOn : labelOff;
            if(isPressed) element.classList.add('val-active');
            else element.classList.remove('val-active');
        }

        function pollGamepad() {
            const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
            const gp = gamepads[0]; 
            
            if (gp) {
                let ax = gp.axes[0] - offsetX; 
                let ay = gp.axes[1] - offsetY; 
                
                ax = Math.max(-1, Math.min(1, ax));
                ay = Math.max(-1, Math.min(1, ay));
                
                outPsX.innerText = ax.toFixed(2); outPsY.innerText = ay.toFixed(2);
                if (Math.abs(ax) > GP_DEADZONE || Math.abs(ay) > GP_DEADZONE) {
                    outPsX.classList.add('val-active'); outPsY.classList.add('val-active');
                } else {
                    outPsX.classList.remove('val-active'); outPsY.classList.remove('val-active');
                }

                if (Math.abs(ax) < GP_DEADZONE) ax = 0;
                if (Math.abs(ay) < GP_DEADZONE) ay = 0;

                let dpadActive = false; let dpX = 0; let dpY = 0;
                if (gp.buttons[12] && gp.buttons[12].pressed) { dpY = 90; dpadActive = true; } 
                if (gp.buttons[13] && gp.buttons[13].pressed) { dpY = -90; dpadActive = true; } 
                if (gp.buttons[14] && gp.buttons[14].pressed) { dpX = -90; dpadActive = true; } 
                if (gp.buttons[15] && gp.buttons[15].pressed) { dpX = 90; dpadActive = true; }  

                if (dpadActive) {
                    cX = dpX; cY = dpY; updateBtnUI(outPsDpad, true, "ACTIVE");
                } else {
                    cX = Math.round(ax * 90); cY = Math.round(-ay * 90);
                    updateBtnUI(outPsDpad, false, "ON", "IDLE");
                }

                let now = Date.now();
                if ((cX !== lX || cY !== lY) && (now - lastSendTime > SEND_INTERVAL)) {
                    send(`X${fFormat(cX)},Y${fFormat(cY)}\n`);
                    lX = cX; lY = cY; lastSendTime = now;
                }

                // --- LOGIK BUTANG ---
                if (gp.buttons[0] && gp.buttons[0].pressed && !gpState.cross) {
                    gpState.cross = true; updateBtnUI(outPsCross, true); send("A\n"); 
                } else if (gp.buttons[0] && !gp.buttons[0].pressed && gpState.cross) {
                    gpState.cross = false; updateBtnUI(outPsCross, false); send("a\n");
                }

                if (gp.buttons[1] && gp.buttons[1].pressed && !gpState.circle) {
                    gpState.circle = true; updateBtnUI(outPsCircle, true); send("B\n"); 
                } else if (gp.buttons[1] && !gp.buttons[1].pressed && gpState.circle) {
                    gpState.circle = false; updateBtnUI(outPsCircle, false); send("b\n");
                }

                if (gp.buttons[2] && gp.buttons[2].pressed && !gpState.square) {
                    gpState.square = true; updateBtnUI(outPsSquare, true); send("C\n"); 
                } else if (gp.buttons[2] && !gp.buttons[2].pressed && gpState.square) {
                    gpState.square = false; updateBtnUI(outPsSquare, false); send("c\n");
                }

                if (gp.buttons[3] && gp.buttons[3].pressed && !gpState.triangle) {
                    gpState.triangle = true; updateBtnUI(outPsTriangle, true); send("D\n"); 
                } else if (gp.buttons[3] && !gp.buttons[3].pressed && gpState.triangle) {
                    gpState.triangle = false; updateBtnUI(outPsTriangle, false); send("d\n");
                }
            }
            requestAnimationFrame(pollGamepad);
        }
        
        pollGamepad(); 
    </script>
</body>
</html>
